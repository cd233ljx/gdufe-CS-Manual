<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食投稿系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gdufe-primary: #1a73e8;
            --gdufe-primary-light: #4d9ff8;
            --gdufe-primary-dark: #1557b0;
            --gdufe-accent: #1a73e8;
            --gdufe-success: #2ecc71;
            --gdufe-warning: #f39c12;
            --gdufe-danger: #e74c3c;
            --gdufe-bg: #f5f5f5;
            --gdufe-surface: #ffffff;
            --gdufe-border: #e0e0e0;
            --gdufe-text: #202124;
            --gdufe-text-secondary: #5f6368;
            --gdufe-text-muted: #9aa0a6;
            --gdufe-gradient-primary: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
            --gdufe-gradient-accent: linear-gradient(135deg, #1a73e8 0%, #34a853 100%);
            --shadow-xs: 0 1px 2px rgba(60, 64, 67, 0.15);
            --shadow-sm: 0 1px 3px rgba(60, 64, 67, 0.15), 0 1px 2px rgba(60, 64, 67, 0.3);
            --shadow-md: 0 2px 6px rgba(60, 64, 67, 0.3);
            --shadow-lg: 0 4px 12px rgba(60, 64, 67, 0.35);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', Arial, sans-serif;
            background-color: var(--gdufe-bg);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: var(--gdufe-surface);
            padding: 3rem 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: var(--gdufe-text);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--gdufe-text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: var(--gdufe-gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--gdufe-gradient-primary);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4d9ff8 0%, #1a73e8 100%);
        }

        .btn-secondary {
            background: var(--gdufe-surface);
            color: var(--gdufe-primary);
            border: 2px solid var(--gdufe-primary);
        }

        .btn-secondary:hover {
            background-color: var(--gdufe-primary);
            color: white;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                <line x1="6" y1="1" x2="6" y2="4"></line>
                <line x1="10" y1="1" x2="10" y2="4"></line>
                <line x1="14" y1="1" x2="14" y2="4"></line>
            </svg>
        </div>
        <h1>美食投稿审核系统</h1>
        <p class="subtitle">欢迎使用美食投稿审核系统，分享你发现的美味！</p>
        <div class="btn-group">
            <a href="{{ url_for('submit') }}" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
                我要投稿
            </a>
            <a href="{{ url_for('login') }}" class="btn btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                管理员登录
            </a>
        </div>
    </div>
</body>
</html>
