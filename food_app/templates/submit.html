<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食投稿</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Noto+Serif+SC:wght@700;900&family=Syne:wght@700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F8F5F1;
            --border-color: #0F0E0E;
            --accent-red: #E03131;
            --accent-yellow: #FCC419;
            --text-main: #0F0E0E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Chivo', 'Noto Serif SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 28px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            font-size: 14px;
        }

        body::before, body::after { display: none !important; }

        .marquee {
            width: 100vw;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 0;
            border-top: 1.5px solid var(--border-color);
            border-bottom: 1.5px solid var(--border-color);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .container {
            background-color: #fff;
            border: 1.5px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
            padding: 1.75rem;
            border-radius: 4px;
            max-width: 640px;
            width: 100%;
            margin: 28px auto 0;
            position: relative;
        }

        h1, h2, h3, .title {
            font-family: 'Syne', 'ZCOOL XiaoWei', serif;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 1px 1px 0px var(--accent-yellow);
            margin-bottom: 1rem;
            border-bottom: 1.5px solid var(--border-color);
            padding-bottom: 6px;
            display: inline-block;
        }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.15rem; }
        h3 { font-size: 1rem; }

        .icon-wrapper {
            width: 52px;
            height: 52px;
            background: var(--accent-red);
            border: 1.5px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            transform: rotate(-3deg);
            transition: transform 0.2s;
        }
        .container:hover .icon-wrapper { transform: rotate(3deg) scale(1.05); }
        .icon-wrapper svg { width: 26px; height: 26px; color: #fff; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        label {
            display: block;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }
        input[type="text"],
        input[type="password"],
        textarea, select {
            width: 100%;
            border: 1.5px solid var(--border-color);
            padding: 0.55rem 0.7rem;
            font-family: 'Chivo', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 3px 3px 0px var(--border-color);
            border-radius: 0;
            transition: all 0.2s;
            background: #fff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            box-shadow: 4px 4px 0px var(--border-color);
            transform: translate(-1px, -1px);
            background: #fffafa;
        }

        button, .btn, .logout, .approve, .reject, .back {
            background-color: var(--accent-yellow);
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-family: 'Chivo', sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.2s;
            border-radius: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 6px;
            margin-right: 6px;
        }
        button:hover, .btn:hover, .logout:hover, .approve:hover, .back:hover {
            background-color: var(--accent-red);
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-color);
        }
        button:active, .btn:active, .logout:active, .approve:active, .back:active {
            transform: translate(0, 0);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-secondary { background-color: #fff; }
        .reject { background-color: var(--accent-red); color: white; }
        .reject:hover { background-color: var(--text-main); }
        .approve { background-color: #69db7c; }

        .flash {
            background: var(--accent-yellow);
            border: 1.5px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            margin-bottom: 1.25rem;
            box-shadow: 3px 3px 0px var(--border-color);
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .submission {
            background: #fff;
            border: 1.5px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 4px 4px 0px var(--border-color);
            text-align: left;
            position: relative;
            transform: rotate(-0.5deg);
        }
        .submission:nth-child(even) { transform: rotate(0.5deg); }

        .category-tag {
            background: var(--accent-yellow);
            border: 1.5px solid var(--border-color);
            padding: 0.2rem 0.5rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1.25rem;
        }

        input[type="file"] { padding: 8px; font-size: 0.85rem; }

        .btn svg, button svg { width: 16px; height: 16px; margin-right: 4px; }

        @media (max-width: 768px) {
            body { padding: 16px 8px; font-size: 13px; }
            .container { padding: 1.25rem; margin: 8px auto; box-shadow: 3px 3px 0px var(--border-color) !important; }
            h1 { font-size: 1.2rem !important; }
            h2 { font-size: 1.05rem !important; }
            h3 { font-size: 0.95rem !important; }
            .btn, button, .logout, .approve, .reject, .back { padding: 0.45rem 0.8rem !important; font-size: 0.75rem !important; margin: 0 !important; }
            .icon-wrapper { width: 40px !important; height: 40px !important; margin: 0 auto 0.75rem; transform: none !important; }
            .icon-wrapper svg { width: 20px !important; height: 20px !important; }
            .marquee { font-size: 0.7rem; padding: 4px 0; }
            .header-content, .header { flex-direction: column; text-align: center; justify-content: center; width: 100%; }
            .submission { padding: 0.75rem !important; box-shadow: 3px 3px 0px var(--border-color) !important; transform: none !important; margin-bottom: 16px; }
            .form-group { margin-bottom: 0.75rem; }
            input, textarea, select { padding: 8px 10px !important; box-shadow: 2px 2px 0px var(--border-color) !important; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="marquee"><span>广财美食投稿系统 — 发现地道美味 — 分享探店随笔 — 优质美食独家推荐</span></div>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
        </div>
        <h1>美食投稿</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('submit') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">店铺名称</label>
                <input type="text" id="title" name="title" placeholder="请输入店铺名称" required>
            </div>
            <div class="form-group">
                <label for="description">推荐理由</label>
                <textarea id="description" name="description" placeholder="分享你的美食体验..." required></textarea>
            </div>
            <div class="form-group">
                <label for="campus">校区</label>
                <select id="campus" name="campus" required>
                    <option value="">请选择校区</option>
                    <option value="sanshui">三水校区</option>
                    <option value="guangzhou">广州校区</option>
                </select>
            </div>
            <div class="form-group">
                <label for="category">美食类别</label>
                <select id="category" name="category" required>
                    <option value="">请选择美食类别</option>
                    <option value="地方菜系（粤菜、东北菜、湘菜等）">地方菜系</option>
                    <option value="异域料理（日料、韩料、东南亚料理）">异域料理</option>
                    <option value="快餐小吃">快餐小吃</option>
                    <option value="甜品饮品">甜品饮品</option>
                </select>
            </div>
            <div class="form-group">
                <label for="stars">推荐星数</label>
                <select id="stars" name="stars" required>
                    <option value="">请选择推荐星数</option>
                    <option value="1">⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="4" selected>⭐⭐⭐⭐</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">人均消费（选填）</label>
                <input type="text" id="price" name="price" placeholder="例如：25元">
            </div>
            <div class="form-group">
                <label for="shop_link">店铺链接（选填）</label>
                <input type="text" id="shop_link" name="shop_link" placeholder="店铺的链接地址">
            </div>
            <div class="form-group">
                <label for="shop_address">店铺地址</label>
                <input type="text" id="shop_address" name="shop_address" placeholder="请输入店铺地址">
            </div>
            <div class="form-group">
                <label for="image">图片上传</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>
            <div class="form-group">
                <label for="submitter">您的昵称（选填）</label>
                <input type="text" id="submitter" name="submitter" placeholder="留下你的昵称">
            </div>
            <div class="form-group">
                <label for="contact">您的联系方式（选填）</label>
                <input type="text" id="contact" name="contact" placeholder="方便后续联系">
            </div>
            <button type="submit">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                提交投稿
            </button>
        </form>
        <a href="{{ url_for('index') }}" class="back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>
</body>
</html>
