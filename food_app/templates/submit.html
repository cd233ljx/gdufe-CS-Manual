<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食投稿</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .flash {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
        }
        .back:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>美食投稿</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('submit') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">店铺名称</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">推荐理由</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div class="form-group">
                <label for="category">美食类别</label>
                <select id="category" name="category" required>
                    <option value="地方菜系（粤菜、东北菜、湘菜等）">地方菜系</option>
                    <option value="异域料理（日料、韩料、东南亚料理）">异域料理</option>
                    <option value="快餐小吃">快餐小吃</option>
                    <option value="甜品饮品">甜品饮品</option>
                </select>
            </div>
            <div class="form-group">
                <label for="image">图片上传</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>
            <div class="form-group">
                <label for="submitter">您的昵称（选填）</label>
                <input type="text" id="submitter" name="submitter">
            </div>
            <div class="form-group">
                <label for="contact">您的联系方式（选填）</label>
                <input type="text" id="contact" name="contact">
            </div>
            <button type="submit">提交投稿</button>
        </form>
        <a href="{{ url_for('index') }}" class="back">返回首页</a>
    </div>
</body>
</html>
