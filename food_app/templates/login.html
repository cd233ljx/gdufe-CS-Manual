<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Noto+Serif+SC:wght@700;900&family=Syne:wght@700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F8F5F1;
            --border-color: #0F0E0E;
            --accent-red: #E03131;
            --accent-yellow: #FCC419;
            --text-main: #0F0E0E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Chivo', 'Noto Serif SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 28px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            font-size: 14px;
        }

        body::before, body::after { display: none !important; }

        .marquee {
            width: 100vw;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 0;
            border-top: 1.5px solid var(--border-color);
            border-bottom: 1.5px solid var(--border-color);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .container {
            background-color: #fff;
            border: 1.5px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
            padding: 1.75rem;
            border-radius: 4px;
            max-width: 640px;
            width: 100%;
            margin: 28px auto 0;
            position: relative;
        }

        h1, h2, h3, .title {
            font-family: 'Syne', 'ZCOOL XiaoWei', serif;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 1px 1px 0px var(--accent-yellow);
            margin-bottom: 1rem;
            border-bottom: 1.5px solid var(--border-color);
            padding-bottom: 6px;
            display: inline-block;
        }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.15rem; }
        h3 { font-size: 1rem; }

        .icon-wrapper {
            width: 52px;
            height: 52px;
            background: var(--accent-red);
            border: 1.5px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            transform: rotate(-3deg);
            transition: transform 0.2s;
        }
        .container:hover .icon-wrapper { transform: rotate(3deg) scale(1.05); }
        .icon-wrapper svg { width: 26px; height: 26px; color: #fff; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        label {
            display: block;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }
        input[type="text"],
        input[type="password"],
        textarea, select {
            width: 100%;
            border: 1.5px solid var(--border-color);
            padding: 0.55rem 0.7rem;
            font-family: 'Chivo', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 3px 3px 0px var(--border-color);
            border-radius: 0;
            transition: all 0.2s;
            background: #fff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            box-shadow: 4px 4px 0px var(--border-color);
            transform: translate(-1px, -1px);
            background: #fffafa;
        }

        button, .btn, .logout, .approve, .reject, .back {
            background-color: var(--accent-yellow);
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-family: 'Chivo', sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.2s;
            border-radius: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 6px;
            margin-right: 6px;
        }
        button:hover, .btn:hover, .logout:hover, .approve:hover, .back:hover {
            background-color: var(--accent-red);
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-color);
        }
        button:active, .btn:active, .logout:active, .approve:active, .back:active {
            transform: translate(0, 0);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-secondary { background-color: #fff; }
        .reject { background-color: var(--accent-red); color: white; }
        .reject:hover { background-color: var(--text-main); }
        .approve { background-color: #69db7c; }

        .flash {
            background: var(--accent-yellow);
            border: 1.5px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            margin-bottom: 1.25rem;
            box-shadow: 3px 3px 0px var(--border-color);
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn svg, button svg { width: 16px; height: 16px; margin-right: 4px; }

        @media (max-width: 768px) {
            body { padding: 16px 8px; font-size: 13px; }
            .container { padding: 1.25rem; margin: 8px auto; box-shadow: 3px 3px 0px var(--border-color) !important; }
            h1 { font-size: 1.2rem !important; }
            h2 { font-size: 1.05rem !important; }
            h3 { font-size: 0.95rem !important; }
            .btn, button, .logout, .approve, .reject, .back { padding: 0.45rem 0.8rem !important; font-size: 0.75rem !important; margin: 0 !important; }
            .icon-wrapper { width: 40px !important; height: 40px !important; margin: 0 auto 0.75rem; transform: none !important; }
            .icon-wrapper svg { width: 20px !important; height: 20px !important; }
            .marquee { font-size: 0.7rem; padding: 4px 0; }
            .form-group { margin-bottom: 0.75rem; }
            input, textarea, select { padding: 8px 10px !important; box-shadow: 2px 2px 0px var(--border-color) !important; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="marquee"><span>广财美食投稿系统 — 发现地道美味 — 分享探店随笔 — 优质美食独家推荐</span></div>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>管理员登录</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                登录
            </button>
        </form>
        <a href="{{ url_for('index') }}" class="back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>
</body>
</html>
