<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gdufe-primary: #1a73e8;
            --gdufe-primary-light: #4d9ff8;
            --gdufe-primary-dark: #1557b0;
            --gdufe-accent: #1a73e8;
            --gdufe-success: #2ecc71;
            --gdufe-warning: #f39c12;
            --gdufe-danger: #e74c3c;
            --gdufe-bg: #f5f5f5;
            --gdufe-surface: #ffffff;
            --gdufe-border: #e0e0e0;
            --gdufe-text: #202124;
            --gdufe-text-secondary: #5f6368;
            --gdufe-text-muted: #9aa0a6;
            --gdufe-gradient-primary: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
            --gdufe-gradient-accent: linear-gradient(135deg, #1a73e8 0%, #34a853 100%);
            --shadow-xs: 0 1px 2px rgba(60, 64, 67, 0.15);
            --shadow-sm: 0 1px 3px rgba(60, 64, 67, 0.15), 0 1px 2px rgba(60, 64, 67, 0.3);
            --shadow-md: 0 2px 6px rgba(60, 64, 67, 0.3);
            --shadow-lg: 0 4px 12px rgba(60, 64, 67, 0.35);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', Arial, sans-serif;
            background-color: var(--gdufe-bg);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: var(--gdufe-surface);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--gdufe-gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        h1 {
            text-align: center;
            color: var(--gdufe-text);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gdufe-text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gdufe-border);
            border-radius: var(--radius-md);
            background-color: var(--gdufe-surface);
            color: var(--gdufe-text);
            font-size: 1rem;
            transition: var(--transition-fast);
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--gdufe-primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--gdufe-text-muted);
        }

        button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--gdufe-gradient-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        button:hover {
            background: linear-gradient(135deg, #4d9ff8 0%, #1a73e8 100%);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button:active {
            transform: translateY(0);
        }

        .flash {
            background-color: rgba(231, 76, 60, 0.1);
            color: #721c24;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-md);
            border-left: 4px solid var(--gdufe-danger);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .flash svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--gdufe-border);
            color: var(--gdufe-text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .back:hover {
            color: var(--gdufe-primary);
        }

        .back svg {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>管理员登录</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px; display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                登录
            </button>
        </form>
        <a href="{{ url_for('index') }}" class="back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>
</body>
</html>
