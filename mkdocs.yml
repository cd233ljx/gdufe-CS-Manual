site_name: 广东财经大学大学生活指南
site_description: 广东财经大学计算机专业学生共建的实用指南
site_url: https://cd233ljx.github.io/gdufe-CS-Manual/
repo_url: https://github.com/cd233ljx/gdufe-CS-Manual
repo_name: gdufe-CS-Manual
copyright: Copyright &copy; 2026 GDUFE CS Manual Contributors

theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  palette:
    # 浅色模式 - 温暖学术风
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式

    # 深色模式 - 深邃科技风
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  font:
    text: "LXGW WenKai"
    code: "JetBrains Mono"

  features:
    # 导航功能
    - navigation.indexes
    - navigation.tabs
    # - navigation.tabs.sticky
    # - navigation.sections
    # - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer

    # 搜索功能
    - search.suggest
    - search.highlight
    - search.share

    # 内容功能
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

    # 其他功能
    - header.autohide
    - announce.dismiss

extra_css:
  - /gdufe-CS-Manual/stylesheets/custom.css?v=20260502
  - /gdufe-CS-Manual/stylesheets/extra.css?v=20260502
  - /gdufe-CS-Manual/stylesheets/ai-assistant.css?v=20260502

extra_javascript:
  - /gdufe-CS-Manual/javascripts/extra.js?v=20260502
  - /gdufe-CS-Manual/javascripts/ai-assistant.js?v=20260502

nav:
  - 首页: index.md
  - 课程资源:
      - 课程总览: courses/c_index.md
      - 基础课程: courses/basic/b_index.md
      - 专业核心课: courses/professional/p_index.md
      - 选修推荐: courses/elective.md
  - 校园生活:
      - 美食地图:
          - 三水校区: life/food/sanshui/map.md
          - 广州校区: life/food/guangzhou/map.md
      - 通勤指南: life/transport/transport.md
      - 舞萌/中二 地图: life/sbga/sbga.md
      - 宿舍生活: life/dormitory/dormitory.md
  - 校园知识库:
      - 知识库总览: campus/index.md
      - 学业规则:
          - 分类总览: campus/academic-rules/index.md
          - 成绩与考试管理办法: campus/academic-rules/grades-exams.md
          - 缓考管理规定: campus/academic-rules/deferred-exams.md
          - 补考: campus/academic-rules/makeup-exams.md
          - 重修管理规定: campus/academic-rules/retake-courses.md
          - 考试违纪与缺考管理规定: campus/academic-rules/exam-discipline-absence.md
          - 学业预警实施办法: campus/academic-rules/academic-warning.md
      - 选课规则:
          - 分类总览: campus/course-selection/index.md
          - 广东财经大学选课流程说明: campus/course-selection/selection-process.md
          - 广东财经大学选课退补改规则: campus/course-selection/add-drop-change.md
          - 广东财经大学选课时间冲突、重复修读、修读限制说明: campus/course-selection/conflict-repeat-limits.md
          - 广东财经大学通识分类要求说明: campus/course-selection/general-education-categories.md
          - 体育选课说明: campus/course-selection/pe-selection.md
          - 广东财经大学体育选课常见 FAQ 及重要通知: campus/course-selection/pe-selection-faq.md
      - 校园办事指南:
          - 分类总览: campus/services/index.md
          - 广东财经大学常见教务窗口办事指南: campus/services/academic-affairs-window.md
          - 广东财经大学在读证明、学籍证明办理指南: campus/services/enrollment-status-certificate.md
          - 广东财经大学成绩单打印或申请指南: campus/services/transcript.md
          - 广东财经大学学生证补办指南: campus/services/student-id-reissue.md
          - 广东财经大学校园卡补办指南: campus/services/campus-card-reissue.md
          - 请假与缓考申请流程指南: campus/services/leave-deferred-exam-application.md
      - 学籍与常见制度:
          - 分类总览: campus/student-status/index.md
          - 休学复学转专业转学分基本规则: campus/student-status/status-change-transfer-credit.md
          - 请假制度: campus/student-status/leave-policy.md
          - 考勤相关说明: campus/student-status/attendance.md
          - 处分与申诉基础规则: campus/student-status/discipline-appeal.md
      - 毕业与培养方案规则:
          - 分类总览: campus/graduation-program/index.md
          - 本科培养方案总则: campus/graduation-program/undergraduate-program.md
          - 演示账号所属专业年级的培养方案: campus/graduation-program/program-example.md
          - 毕业学分毕业条件说明: campus/graduation-program/graduation-credits.md
          - 学位授予相关基本规则: campus/graduation-program/degree-award.md
          - 通识课要求: campus/graduation-program/general-education-requirements.md
          - 体育课要求: campus/graduation-program/pe-requirements.md
      - 教学日历与重要时间节点:
          - 分类总览: campus/calendar/index.md
          - 广东财经大学校历: campus/calendar/academic-calendar.md
          - 选课时间通知: campus/calendar/course-selection-schedule.md
          - 期末考试周安排: campus/calendar/final-exam-week.md
          - 补考安排通知: campus/calendar/makeup-exam-schedule.md
          - 放假调课通知: campus/calendar/holiday-class-adjustment.md
      - 校园生活服务:
          - 分类总览: campus/student-life-services/index.md
          - 宿舍报修: campus/student-life-services/dorm-repair.md
          - 水电缴费: campus/student-life-services/utilities-payment.md
          - 图书馆借阅预约: campus/student-life-services/library-borrow-reserve.md
          - 奖助学金基础说明: campus/student-life-services/scholarship-aid.md
          - 就业中心实习手续: campus/student-life-services/internship-procedures.md
          - 校医院心理中心: campus/student-life-services/clinic-counseling.md
  - 工具箱: tools/tools.md
  - FAQ: FaQ/faq.md
  - 贡献指南: contribute/contribute.md

plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-]'
  - minify:
      minify_html: true
  # - tags

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: 目录

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: cd233ljx
      repo: gdufe-CS-Manual
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  # 侧栏 AI 助手：后端必须把文档站 Origin 加入 CORS（如仅允许 localhost:3000，mkdocs 默认 8000 会被拦截）
  gdufe_ai:
    enabled: true
    # 例: http://localhost:5001/api/external/chat
    api_url: "http://localhost:5001/api/external/chat" 
    api_key: "gdufe-c1f35085e0114cf692dab1f369fae364"
    title: "AI 助手"
    placeholder: "输入问题…"
    # external_chat：流式 POST { message, stream: true }；非流式仅 { message }；JSON 响应 { success, answer }
    request_mode: "external_chat"
    stream: true
    model: "" # 仅 openai_messages 时使用
    include_page_context: true
    include_history_in_message: true # external_chat 下多轮拼入一条 message
    system_prompt: ""

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cd233ljx/gdufe-CS-Manual
      name: GitHub 仓库
    - icon: fontawesome/brands/weixin
      link: https://youke.xn--y7xa690gmna.cn/s1/2026/02/08/69876395a9865.webp
      name: 微信（注明来意）

  analytics:
    provider: google
    property: G-XXXXXXXXXX

